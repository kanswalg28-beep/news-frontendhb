<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Chronicle Retracted | Honestly Biased</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body.error-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #18191b 0%, #0d0e10 100%);
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }
        .error-card {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 48px 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        .error-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-saffron), var(--accent-cyan));
        }
        .error-icon-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(225, 48, 108, 0.05);
            border: 1px solid rgba(178, 41, 46, 0.2);
            color: var(--accent-saffron);
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(178, 41, 46, 0.15);
        }
        .error-title {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
        }
        .error-subtitle {
            font-family: var(--font-body);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-green);
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .error-desc {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0 auto 32px auto;
        }
        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            display: inline-block;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: 1px solid var(--text-primary);
        }
        .btn-home:hover {
            background: transparent;
            color: var(--text-primary);
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="dark-theme error-page">
    <div class="error-card glass-element">
        <div class="error-icon-container">
            <i data-lucide="shield-alert" style="width: 36px; height: 36px;"></i>
        </div>
        <div class="error-subtitle">
            <span class="pulse-dot"></span>
            Objectively Retracted
        </div>
        <h1 class="error-title">Chronicle Not Found</h1>
        <p class="error-desc">
            Our AI narrative engine audited the requested URL. Outcome: 100% missing. The page you are looking for has been retracted, rewritten, or was systemically a myth anyway. Let's return to the ledger.
        </p>
        <a href="/" class="btn-home">
            <span>Return to Ledger</span>
            <i data-lucide="arrow-left"></i>
        </a>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
