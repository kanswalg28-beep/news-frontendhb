<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="100%" height="100%">
  <!-- Beautiful graphic symbol: Overlapping Perspective Lenses -->
  <g transform="translate(10, 10)">
    <!-- Facts Lens (Left) -->
    <circle cx="25" cy="30" r="24" fill="none" stroke="currentColor" stroke-width="2" opacity="0.25" />
    <circle cx="25" cy="30" r="24" fill="none" stroke="url(#greenGrad)" stroke-width="2" stroke-dasharray="80 70" />
    
    <!-- Interpretation Lens (Right) -->
    <circle cx="45" cy="30" r="24" fill="none" stroke="currentColor" stroke-width="2" opacity="0.25" />
    <circle cx="45" cy="30" r="24" fill="none" stroke="url(#saffronGrad)" stroke-width="2" stroke-dasharray="60 90" stroke-dashoffset="40" />
    
    <!-- Honest Bias Intersection Zone (Overlap Highlight) -->
    <path d="M 35,12 A 24,24 0 0,1 45,30 A 24,24 0 0,1 35,48 A 24,24 0 0,1 25,30 A 24,24 0 0,1 35,12 Z" 
          fill="url(#saffronGrad)" opacity="0.8" />
    <path d="M 35,12 A 24,24 0 0,1 45,30 A 24,24 0 0,1 35,48 A 24,24 0 0,1 25,30 A 24,24 0 0,1 35,12 Z" 
          fill="url(#greenGrad)" opacity="0.4" style="mix-blend-mode: multiply;" />
          
    <circle cx="35" cy="30" r="3" fill="#ffffff" />
  </g>
  
  <!-- Beautiful typographic title -->
  <text x="85" y="42" font-family="'Space Grotesk', 'Outfit', 'Helvetica', sans-serif" font-size="28" font-weight="800" letter-spacing="1" fill="currentColor">
    HONESTLY<tspan fill="url(#saffronGrad)">BIASED</tspan>
  </text>
  <text x="87" y="58" font-family="'Space Grotesk', 'Outfit', sans-serif" font-size="9" font-weight="700" letter-spacing="6" fill="currentColor" opacity="0.6">
    INDEPENDENT COMMENTARY &amp; SATIRE
  </text>
  
  <defs>
    <!-- Hyper-vibrant Saffron Gradient -->
    <linearGradient id="saffronGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5500" />
      <stop offset="100%" stop-color="#FF8800" />
    </linearGradient>
    <!-- Sharp Truth Green Gradient -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A859" />
      <stop offset="100%" stop-color="#00C853" />
    </linearGradient>
  </defs>
</svg>
